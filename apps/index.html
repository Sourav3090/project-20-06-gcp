<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Website Under Maintenance</title>

<style>

body{
    margin:0;
    font-family:Arial, sans-serif;
    background:linear-gradient(135deg,#0f172a,#334155);
    color:white;
    text-align:center;
}

.container{
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    padding:20px;
}

.card{

    background:rgba(255,255,255,0.1);
    padding:50px 40px;
    border-radius:20px;
    width:400px;
    box-shadow:0 10px 30px rgba(0,0,0,0.3);

}


.icon{

    font-size:70px;
    margin-bottom:20px;

}


h1{

    font-size:38px;
    margin-bottom:15px;

}


p{

    font-size:18px;
    line-height:1.6;
    color:#e2e8f0;

}


.status{

    margin-top:30px;
    padding:15px;
    background:#f59e0b;
    border-radius:10px;
    font-weight:bold;
    font-size:18px;

}


.footer{

    margin-top:30px;
    font-size:14px;
    color:#cbd5e1;

}


button{

    margin-top:25px;
    padding:12px 25px;
    border:none;
    border-radius:8px;
    background:#22c55e;
    color:white;
    font-size:16px;
    cursor:pointer;

}


button:hover{

    background:#16a34a;

}

</style>

</head>


<body>


<div class="container">

<div class="card">


<div class="icon">
🛠️
</div>


<h1>
Website Under Maintenance
</h1>


<p>
We are currently performing some improvements 
to provide you with a better experience.
</p>


<div class="status">

⏳ Maintenance In Progress

</div>


<p>

Our team is working on updates and improvements.
<br>
Please check back soon.

</p>


<button>

Thank You For Your Patience

</button>


<div class="footer">

© 2026 Your Company Name  
<br>
All Rights Reserved

</div>


</div>

</div>


</body>

</html>
