name: Deploy to Google Cloud

on:
  push:
    branches:
      - dev

permissions:
  contents: read
  id-token: write


jobs:

  build-deploy:

    runs-on: ubuntu-latest

    steps:

    - name: Checkout code
      uses: actions/checkout@v4


    - name: Debug GitHub Identity
      run: |
        echo "Repository: $GITHUB_REPOSITORY"
        echo "Branch: $GITHUB_REF"


    - name: Authenticate to Google Cloud
      uses: google-github-actions/auth@v2
      with:
        workload_identity_provider: projects/854956339642/locations/global/workloadIdentityPools/github-pool/providers/github-provider

        service_account: github-cicd@single-obelisk-500104-c8.iam.gserviceaccount.com


    - name: Setup Google Cloud SDK
      uses: google-github-actions/setup-gcloud@v2


    - name: Verify Authentication
      run: |
        gcloud auth list
        gcloud config list


    - name: Build Docker Image
      run: |
        docker build -t app .


    - name: Configure Docker Auth
      run: |
        gcloud auth configure-docker


    - name: Push Docker Image
      run: |
        docker tag app gcr.io/single-obelisk-500104-c8/app:latest
        docker push gcr.io/single-obelisk-500104-c8/app:latest
